<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plain Static Deployment Example</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">Plain Static</p>
      <h1>Static files are the smallest deployment surface.</h1>
      <p>
        This page is ready for static hosting. Verify that HTML, CSS, and JavaScript all load after deployment.
      </p>
      <button id="check" type="button">Run browser check</button>
      <p id="result" role="status"></p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
